<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>驾考全科工具</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23277a55'/%3E%3Cpath d='M6 20h20l-2.5-8H8.5L6 20Zm3 0v4m14-4v4M10 17h12' fill='none' stroke='white' stroke-width='2.5' stroke-linecap='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 48 48" role="img">
              <path d="M8 31h32l-4-14a6 6 0 0 0-5.8-4.4H17.8A6 6 0 0 0 12 17L8 31Z" />
              <path d="M12 31v5m24-5v5" />
              <path d="M15 24h18" />
              <circle cx="16" cy="31" r="3" />
              <circle cx="32" cy="31" r="3" />
            </svg>
          </div>
          <div>
            <h1>驾考全科工具</h1>
            <p>科目一 · 科目二 · 科目三 · 科目四</p>
          </div>
        </div>

        <button id="mobileMenuToggle" class="mobile-menu-toggle" type="button" data-action="toggle-mobile-menu" aria-expanded="false" aria-controls="viewTabs statsBar">
          <span>菜单</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 7h16" />
            <path d="M4 12h16" />
            <path d="M4 17h16" />
          </svg>
        </button>

        <nav id="viewTabs" class="tabs" aria-label="模块"></nav>
        <div id="statsBar" class="stats-bar"></div>
        <label class="search mobile-search">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m21 21-4.3-4.3" />
            <circle cx="11" cy="11" r="7" />
          </svg>
          <input id="mobileSearchInput" type="search" placeholder="搜索知识点或题目" autocomplete="off" />
        </label>
      </header>

      <main class="layout">
        <aside class="rail" aria-label="侧栏">
          <label class="search">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m21 21-4.3-4.3" />
              <circle cx="11" cy="11" r="7" />
            </svg>
            <input id="searchInput" type="search" placeholder="搜索知识点或题目" autocomplete="off" />
          </label>

          <section class="source-box">
            <h2>资料依据</h2>
            <div class="source-list">
              <span>道路交通安全法</span>
              <span>道路交通安全法实施条例</span>
              <span>GA 1026-2022</span>
              <span>公安部令第163号</span>
              <span>公安部令第172号</span>
            </div>
          </section>

          <section id="quickPanel" class="quick-panel"></section>

          <section class="sign-board" aria-label="常见标志">
            <div class="mini-sign warning">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <path d="M24 6 44 41H4L24 6Z" />
                <path d="M24 18v11m0 6v2" />
              </svg>
              <span>警告</span>
            </div>
            <div class="mini-sign ban">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="24" r="18" />
                <path d="m13 35 22-22" />
              </svg>
              <span>禁令</span>
            </div>
            <div class="mini-sign guide">
              <svg viewBox="0 0 48 48" aria-hidden="true">
                <path d="M10 24h25" />
                <path d="m27 14 10 10-10 10" />
              </svg>
              <span>指示</span>
            </div>
          </section>
        </aside>

        <section id="mainPanel" class="main-panel" aria-live="polite"></section>
      </main>
    </div>

    <input id="importInput" class="visually-hidden" type="file" accept="application/json,.json" />
    <input id="progressImportInput" class="visually-hidden" type="file" accept="application/json,.json" />
    <script src="verified-500.js"></script>
    <script src="app.js"></script>
  </body>
</html>
